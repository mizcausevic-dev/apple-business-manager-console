name: Deploy to abm.kineticgain.com

# Static HTML -> Hostinger FTP at /abm/
# workflow_dispatch-only: subdomain not yet in Hostinger DNS.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-apple-business-manager-console
  cancel-in-progress: false

jobs:
  deploy:
    name: FTP-sync to abm.kineticgain.com
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Verify build inputs
        run: |
          test -f index.html || (echo "FAIL: index.html missing" && exit 1)
          grep -q "Apple Business Manager Console" index.html || (echo "FAIL: index.html missing title" && exit 1)
          echo "OK: verified"

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /abm/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            README.md
            CHANGELOG.md
            LICENSE
            SECURITY.md
            CODE_OF_CONDUCT.md
            .gitignore
